spring.application.name=simple-DFS-coordinator

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/sdfsmeta
spring.datasource.username=
spring.datasource.password=

# Hibernate (JPA) settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.security.user.name=${SDFS_ADMIN_USERNAME:admin}
spring.security.user.password=${SDFS_ADMIN_PASSWORD}
